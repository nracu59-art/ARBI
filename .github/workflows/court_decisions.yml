name: Court Decisions Daily Bot

on:
  schedule:
    - cron: '30 4 * * *'   # 07:30 EEST (UTC+3, vara Moldova)
  workflow_dispatch:         # rulare manuală pentru testare

jobs:
  send-decisions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run bot + PDF analysis
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.COURT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.COURT_CHAT_ID }}

      - name: Commit HTML report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Add court decisions PDF report $(date +'%Y-%m-%d')"
          git push

      - name: Upload debug screenshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
