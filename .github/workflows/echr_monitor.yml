name: CEDO Monitor – Confiscare

on:
  # 22:00 ora României (EEST = UTC+3 vara, EET = UTC+2 iarna)
  # Vara (mar–oct): 19:00 UTC = 22:00 EEST
  # Iarna (oct–mar): 20:00 UTC = 22:00 EET → ajustați cron-ul manual dacă e nevoie
  schedule:
    - cron: '0 19 * * *'    # 22:00 Romania (vara) – verificare HUDOC
    - cron: '30 4 * * *'    # 07:30 Romania (vara) – generare raport HTML
  workflow_dispatch:
    inputs:
      step:
        description: 'Ce pas să ruleze'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - fetch
          - report

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────
# JOB 1: Verificare HUDOC (rulează la 22:00)
# ─────────────────────────────────────────────────────────────
jobs:
  fetch-judgments:
    name: Verificare HUDOC
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 19 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.step == 'fetch' || github.event.inputs.step == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run HUDOC checker
        run: python scripts/echr_checker.py

      - name: Commit JSON results
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No new results to commit."
          else
            git commit -m "📊 CEDO verificare $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi

# ─────────────────────────────────────────────────────────────
# JOB 2: Generare raport HTML (rulează la 07:30)
# ─────────────────────────────────────────────────────────────
  generate-report:
    name: Generare raport HTML
    runs-on: ubuntu-latest
    needs: [fetch-judgments]
    if: >
      always() && (
        github.event.schedule == '30 4 * * *' ||
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.step == 'report' || github.event.inputs.step == 'both'))
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate HTML report
        run: python scripts/generate_html_report.py

      - name: Commit HTML report
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📋 Raport CEDO $(date -u '+%Y-%m-%d') – generat la 07:30"
            git push origin HEAD
          fi
