name: CEDO Monitor – Confiscare

on:
  schedule:
    - cron: '0 19 * * *'   # 22:00 Romania vara (EEST = UTC+3)
    - cron: '30 4 * * *'   # 07:30 Romania vara (EEST = UTC+3)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cedo-monitor
  cancel-in-progress: false

jobs:
# ─────────────────────────────────────────────────────────────
# JOB 1 – Verificare HUDOC (22:00 sau manual)
# ─────────────────────────────────────────────────────────────
  fetch-judgments:
    name: Verificare HUDOC
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 19 * * *' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run HUDOC checker
        run: python scripts/echr_checker.py

      - name: Commit JSON results
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add results/
          if git diff --cached --quiet; then
            echo "No new results to commit."
          else
            git commit -m "📊 CEDO verificare $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:main
          fi

# ─────────────────────────────────────────────────────────────
# JOB 2 – Raport HTML + Telegram (07:30 sau după fetch manual)
# ─────────────────────────────────────────────────────────────
  generate-report:
    name: Generare raport HTML + Telegram
    runs-on: ubuntu-latest
    needs: [fetch-judgments]
    if: >
      always() && (
        github.event.schedule == '30 4 * * *' ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate HTML report
        run: python scripts/generate_html_report.py

      - name: Commit HTML report
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📋 Raport CEDO $(date -u '+%Y-%m-%d')"
            git push origin HEAD:main
          fi

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_report.py

# ─────────────────────────────────────────────────────────────
# JOB 3 – Analiză PDF hotărâri (după raport)
# ─────────────────────────────────────────────────────────────
  analyze-pdfs:
    name: Analiză PDF hotărâri
    runs-on: ubuntu-latest
    needs: [generate-report]
    if: >
      always() && (
        github.event.schedule == '30 4 * * *' ||
        github.event_name == 'workflow_dispatch'
      )
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Analyze judgment PDFs
        run: python scripts/analyze_pdfs.py

      - name: Commit analysis report
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔍 Analiză CEDO $(date -u '+%Y-%m-%d')"
            git push origin HEAD:main
          fi
