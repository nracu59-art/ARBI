name: CEDO Monitor – Confiscare

on:
  schedule:
    - cron: '0 19 * * *'   # 22:00 Romania vara (EEST = UTC+3)
    - cron: '30 4 * * *'   # 07:30 Romania vara (EEST = UTC+3)
  workflow_dispatch: {}     # pornire manuală fără parametri

permissions:
  contents: write

concurrency:
  group: cedo-monitor
  cancel-in-progress: false  # rulările se pun la coadă, nu se anulează

# ─────────────────────────────────────────────────────────────
# JOB 1 – Verificare HUDOC (22:00 sau manual)
# ─────────────────────────────────────────────────────────────
jobs:
  fetch-judgments:
    name: Verificare HUDOC
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 19 * * *' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run HUDOC checker
        run: python scripts/echr_checker.py

      - name: Commit JSON results
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No new results to commit."
          else
            git commit -m "📊 CEDO verificare $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi

# ─────────────────────────────────────────────────────────────
# JOB 2 – Raport HTML (07:30 sau după fetch la rulare manuală)
# ─────────────────────────────────────────────────────────────
  generate-report:
    name: Generare raport HTML
    runs-on: ubuntu-latest
    needs: [fetch-judgments]
    if: >
      always() && (
        github.event.schedule == '30 4 * * *' ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate HTML report
        run: python scripts/generate_html_report.py

      - name: Commit HTML report
        run: |
          git config user.name  "CEDO Monitor Bot"
          git config user.email "cedo-monitor@noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📋 Raport CEDO $(date -u '+%Y-%m-%d')"
            git push origin HEAD
          fi
