name: ECHR Confiscation Monitor

on:
  schedule:
    - cron: '0 19 * * *'   # 22:00 Moldova EEST (UTC+3) — verificare HUDOC
    - cron: '30 4 * * *'   # 07:30 Moldova EEST (UTC+3) — trimitere raport
  workflow_dispatch:
    inputs:
      action:
        description: 'Acțiunea de rulat'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - report
          - both

permissions:
  contents: write

jobs:
  check-echr:
    name: Verificare HUDOC
    if: |
      github.event.schedule == '0 19 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == 'check' || github.event.inputs.action == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Interogare HUDOC API
        run: python scripts/echr_checker.py

      - name: Salvare rezultate în repository
        run: |
          git config user.name "ECHR Monitor Bot"
          git config user.email "echr-bot@noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "chore: ECHR check $(date -u +%Y-%m-%d)"
          git push origin HEAD

  send-report:
    name: Trimitere Raport Telegram
    if: |
      github.event.schedule == '30 4 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == 'report' || github.event.inputs.action == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Trimitere raport Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_report.py
