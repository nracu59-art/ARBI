<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ─── Reset / base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--font, 'Plus Jakarta Sans', system-ui, sans-serif);
      color: oklch(0.22 0.01 80);
      background: var(--bg, oklch(0.985 0.008 85));
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    button { font-family: inherit; }
    code, kbd { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* ─── Root layout ──────────────────────────────────────────────────────── */
    .root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: background 0.4s ease;
      background: var(--bg);
    }

    /* ─── Ambient backdrop blobs (spatial depth, very soft) ────────────────── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      transition: background 0.5s ease;
    }
    .blob-1 { top: -10%;  left: -8%;  width: 38vw; height: 38vw; }
    .blob-2 { bottom: -12%; right: -10%; width: 42vw; height: 42vw;
              background: oklch(0.95 0.03 30); }
    .blob-3 { top: 30%; right: 15%; width: 22vw; height: 22vw;
              background: oklch(0.96 0.025 180); opacity: 0.4; }

    /* ─── Topbar ───────────────────────────────────────────────────────────── */
    .topbar {
      position: relative; z-index: 5;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 7px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4),
                  0 4px 10px rgba(0,0,0,0.10);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .brand-name {
      font-weight: 700; font-size: 14px; letter-spacing: -0.01em;
      color: oklch(0.32 0.01 80);
    }
    .topbar-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; color: oklch(0.45 0.02 80);
      font-variant-numeric: tabular-nums;
    }
    .meta-time { font-weight: 600; color: oklch(0.32 0.01 80); }
    .meta-dot { opacity: 0.4; }
    .meta-date::first-letter { text-transform: uppercase; }

    /* ─── Hero ─────────────────────────────────────────────────────────────── */
    .hero {
      position: relative; z-index: 5;
      width: 100%;
      max-width: 920px;
      margin: 36px auto 12px;
      padding: 0 28px;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
    }
    .hero-greeting {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .greet-line {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 700;
      letter-spacing: -0.025em;
      color: oklch(0.22 0.01 80);
    }
    .greet-sub {
      font-size: 14px;
      color: oklch(0.50 0.01 80);
      letter-spacing: 0.005em;
    }
    .greet-sub::first-letter { text-transform: uppercase; }

    /* Search */
    .search {
      position: relative;
      width: 100%;
      max-width: 620px;
    }
    .search input {
      width: 100%;
      height: 58px;
      padding: 0 64px 0 56px;
      font-family: inherit;
      font-size: 17px;
      color: oklch(0.20 0.01 80);
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        0 1px 1px rgba(0,0,0,0.02),
        0 12px 32px -10px rgba(15, 23, 42, 0.12),
        0 24px 56px -20px rgba(15, 23, 42, 0.16);
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .search input::placeholder { color: oklch(0.62 0.01 80); }
    .search input:focus {
      border-color: color-mix(in oklch, var(--accent-color, oklch(0.62 0.18 250)) 60%, transparent);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        0 0 0 4px color-mix(in oklch, var(--accent-color, oklch(0.62 0.18 250)) 12%, transparent),
        0 16px 40px -12px rgba(15, 23, 42, 0.16),
        0 28px 60px -20px rgba(15, 23, 42, 0.20);
    }
    .search-ico {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      font-size: 20px;
      color: oklch(0.55 0.01 80);
      pointer-events: none;
    }
    .search.has-query .search-ico { color: oklch(0.40 0.01 80); }
    .kbd {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      display: flex; gap: 4px;
      pointer-events: none;
    }
    .kbd-key {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      color: oklch(0.45 0.01 80);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-bottom-width: 2px;
      border-radius: 6px;
    }
    .search-clear {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 0; border-radius: 8px; cursor: default;
      color: oklch(0.50 0.01 80);
      background: rgba(15, 23, 42, 0.05);
      font-size: 14px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .search-clear:hover { background: rgba(15, 23, 42, 0.10); color: oklch(0.22 0.01 80); }

    /* Hero row: count / layout toggle / add */
    .hero-row {
      width: 100%; max-width: 620px;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .hero-count {
      font-size: 12.5px;
      font-weight: 500;
      color: oklch(0.50 0.01 80);
      letter-spacing: 0.005em;
    }
    .layout-toggle {
      margin-left: auto;
      display: inline-flex;
      padding: 3px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.07);
      border-radius: 11px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        0 4px 12px -4px rgba(15, 23, 42, 0.08);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .lt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      font-size: 12px; font-weight: 500;
      color: oklch(0.50 0.01 80);
      background: transparent;
      border: 0; border-radius: 8px;
      cursor: default;
      transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
    }
    .lt i { font-size: 14px; }
    .lt:hover { color: oklch(0.22 0.01 80); }
    .lt.is-active {
      background: white;
      color: oklch(0.22 0.01 80);
      box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 2px 6px rgba(15,23,42,0.05);
    }
    .lt span { white-space: nowrap; }
    .hero-add {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      font-size: 13px; font-weight: 600;
      color: white;
      background: oklch(0.55 0.22 280);
      border: 0; border-radius: 10px;
      cursor: default;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 4px 10px rgba(15, 23, 42, 0.14),
        0 1px 0 rgba(255,255,255,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    .hero-add i { font-size: 15px; }
    .hero-add:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 8px 18px rgba(15, 23, 42, 0.18);
    }
    .hero-add:active { transform: translateY(0); }

    /* ─── Apps section ─────────────────────────────────────────────────────── */
    .apps-section {
      position: relative; z-index: 5;
      flex: 1;
      width: 100%;
      max-width: 1100px;
      margin: 28px auto 80px;
      padding: 0 28px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: var(--density, 22px);
      justify-items: center;
    }

    /* Tile */
    .tile-wrap {
      position: relative;
      width: 100%;
      max-width: 124px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: opacity 0.15s ease, transform 0.18s ease;
    }
    .tile-wrap.is-dragging { opacity: 0.35; }
    .tile-wrap.is-drop-target { transform: scale(1.06); }
    .tile-wrap.is-drop-target .tile {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 0 0 3px white,
        0 0 0 5px color-mix(in oklch, var(--accent-color, oklch(0.62 0.18 250)) 50%, transparent),
        0 14px 32px rgba(15, 23, 42, 0.18) !important;
    }

    .tile-actions {
      position: absolute;
      top: -8px; right: -4px;
      display: flex; gap: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      transform: translateY(4px);
      z-index: 3;
    }
    .tile-wrap:hover .tile-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .tile-act {
      width: 24px; height: 24px;
      display: inline-flex; align-items: center; justify-content: center;
      background: white;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 50%;
      color: oklch(0.40 0.01 80);
      font-size: 11px;
      cursor: default;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.14);
      transition: color 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }
    .tile-act:hover { transform: scale(1.10); color: oklch(0.22 0.01 80); }
    .tile-act.danger:hover { color: oklch(0.55 0.22 25); background: oklch(0.98 0.02 25); }

    .tile {
      position: relative;
      width: var(--tile-size, 84px);
      height: var(--tile-size, 84px);
      border: 0;
      cursor: default;
      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.28s ease,
        filter 0.2s ease;
      display: inline-flex; align-items: center; justify-content: center;
      color: white;
      overflow: hidden;
    }
    .tile-gloss {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.55), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(0,0,0,0.05));
      pointer-events: none;
      transition: opacity 0.25s ease;
      opacity: 0.9;
    }
    .tile-icon {
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.25));
    }
    .tile:hover {
      transform: translateY(-5px) scale(1.04) rotate(-1deg);
      filter: brightness(1.04) saturate(1.05);
    }
    .tile:active {
      transform: translateY(-1px) scale(0.96);
      transition-duration: 0.08s;
    }
    .tile-wrap:hover .tile-gloss { opacity: 1; }

    .tile-label {
      font-size: var(--label-size, 12px);
      font-weight: 500;
      color: oklch(0.30 0.01 80);
      text-align: center;
      line-height: 1.3;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: 0.005em;
    }

    /* Add tile (in grid) */
    .add-tile {
      width: 100%;
      max-width: 124px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 0;
      background: transparent;
      border: 0;
      cursor: default;
    }
    .add-tile::before {
      content: '';
      width: var(--tile-size, 84px);
      height: var(--tile-size, 84px);
      border-radius: 20px;
      border: 1.5px dashed oklch(0.75 0.01 80);
      background: rgba(255, 255, 255, 0.35);
      display: inline-flex;
    }
    .add-tile {
      position: relative;
    }
    .add-tile > i {
      position: absolute;
      top: calc(var(--tile-size) / 2 - 12px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: oklch(0.55 0.01 80);
      transition: color 0.15s ease, transform 0.15s ease;
    }
    .add-tile > span {
      font-size: var(--label-size, 12px);
      color: oklch(0.55 0.01 80);
      font-weight: 500;
    }
    .add-tile:hover > i { color: oklch(0.30 0.01 80); transform: translateX(-50%) scale(1.1); }
    .add-tile:hover::before {
      border-color: oklch(0.50 0.01 80);
      background: rgba(255, 255, 255, 0.6);
    }

    /* ─── List layout ──────────────────────────────────────────────────────── */
    .list {
      display: flex; flex-direction: column;
      gap: calc(var(--density, 22px) / 3);
      max-width: 720px;
      margin: 0 auto;
    }
    .row {
      display: flex; align-items: stretch;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 1px 2px rgba(15,23,42,0.03), 0 4px 12px rgba(15,23,42,0.04);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
    .row:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(15,23,42,0.05), 0 14px 28px rgba(15,23,42,0.10);
      border-color: rgba(15, 23, 42, 0.10);
    }
    .row.is-dragging { opacity: 0.35; }
    .row.is-drop-target {
      border-color: color-mix(in oklch, var(--accent-color, oklch(0.62 0.18 250)) 60%, transparent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent-color, oklch(0.62 0.18 250)) 20%, transparent);
    }
    .row-main {
      flex: 1;
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      border: 0; background: transparent;
      cursor: default;
      text-align: left;
    }
    .row-tile {
      width: 44px; height: 44px;
      flex-shrink: 0;
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      color: white; font-size: 20px;
      position: relative;
    }
    .row-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
    .row-name {
      font-size: 14px; font-weight: 600;
      color: oklch(0.22 0.01 80);
      letter-spacing: -0.005em;
    }
    .row-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: oklch(0.55 0.01 80);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .row-launch {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px;
      color: oklch(0.55 0.01 80);
      transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
    }
    .row:hover .row-launch { background: rgba(15, 23, 42, 0.05); color: oklch(0.22 0.01 80); transform: translate(2px, -2px); }
    .row-actions {
      display: flex; align-items: center; gap: 4px;
      padding: 0 12px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .row:hover .row-actions { opacity: 1; }

    /* ─── Dock layout ──────────────────────────────────────────────────────── */
    .dock-wrap {
      display: flex;
      justify-content: center;
      padding: 12px 0 0;
    }
    .dock {
      display: inline-flex;
      align-items: flex-end;
      gap: calc(var(--density, 22px) / 1.5);
      padding: 16px 22px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 28px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 1px 2px rgba(15,23,42,0.04),
        0 16px 40px -8px rgba(15,23,42,0.18),
        0 30px 60px -20px rgba(15,23,42,0.16);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    .dock .tile-wrap { max-width: none; width: auto; gap: 0; }
    .dock .tile-label { display: none; }
    .dock-add {
      width: var(--tile-size, 84px);
      height: var(--tile-size, 84px);
      border-radius: 20px;
      border: 1.5px dashed oklch(0.70 0.01 80);
      background: rgba(255, 255, 255, 0.4);
      color: oklch(0.55 0.01 80);
      font-size: 22px;
      cursor: default;
      transition: transform 0.2s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .dock-add:hover { transform: translateY(-3px); color: oklch(0.30 0.01 80); border-color: oklch(0.45 0.01 80); }

    /* ─── Empty state ──────────────────────────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 80px 20px;
      color: oklch(0.55 0.01 80);
    }
    .empty i {
      font-size: 56px;
      opacity: 0.3;
    }
    .empty p { margin: 0; font-size: 14px; }

    /* ─── Footer ───────────────────────────────────────────────────────────── */
    .foot {
      position: relative; z-index: 5;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      flex-wrap: wrap;
      padding: 24px;
      font-size: 12px;
      color: oklch(0.55 0.01 80);
    }
    .foot kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      color: oklch(0.35 0.01 80);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-bottom-width: 2px;
      border-radius: 5px;
    }
    .foot .dotsep { opacity: 0.4; }

    /* ─── Modal ────────────────────────────────────────────────────────────── */
    .modal-back {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.18);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal {
      width: 100%;
      max-width: 540px;
      max-height: calc(100vh - 48px);
      background: oklch(0.99 0.005 85);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 22px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.7) inset,
        0 24px 50px -12px rgba(15, 23, 42, 0.25),
        0 50px 100px -30px rgba(15, 23, 42, 0.30);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-sm { max-width: 400px; }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 8px;
    }
    .modal-head h3 {
      margin: 0;
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em;
      color: oklch(0.20 0.01 80);
    }
    .modal-close {
      width: 30px; height: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0; border-radius: 8px;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which

    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),

    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,

    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>
      <div className="twk-sect">{label}</div>

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      } else if (e.key === 'Escape') {
        if (modal) setModal(null);else
        if (confirmDel) setConfirmDel(null);else
        if (document.activeElement === searchRef.current) {setQuery('');searchRef.current?.blur();}
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [modal, confirmDel]);

  const filtered = useMemo(() => {
    const q = norm(query);
    return q ? apps.filter((a) => norm(a.name).includes(q) || norm(a.url).includes(q)) : apps;
  }, [apps, query]);

  useEffect(() => {setActiveIdx(0);}, [query]);

  // Enter from search → launch first result
  const onSearchKey = (e) => {
    if (e.key === 'Enter' && filtered[activeIdx]) {
      launchApp(filtered[activeIdx].url);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActiveIdx((i) => Math.min(filtered.length - 1, i + 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActiveIdx((i) => Math.max(0, i - 1));
    }
  };

  // ── Drag & drop ────────────────────────────────────────────────────────────
  const onDragStart = (id) => (e) => {
    setDragId(id);
    e.dataTransfer.effectAllowed = 'move';
    try {e.dataTransfer.setData('text/plain', String(id));} catch {}
  };
  const onDragOver = (id) => (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (id !== dropId) setDropId(id);
  };
  const onDragLeave = () => (e) => {





    // no-op; handled by next dragover
  };const onDrop = (id) => (e) => {e.preventDefault();if (dragId == null || dragId === id) {setDragId(null);setDropId(null);return;}setApps((prev) => {const from = prev.findIndex((a) => a.id === dragId);
        const to = prev.findIndex((a) => a.id === id);
        if (from === -1 || to === -1) return prev;
        const next = [...prev];
        const [moved] = next.splice(from, 1);
        next.splice(to, 0, moved);
        return next;
      });
    setDragId(null);setDropId(null);
  };
  const onDragEnd = () => {setDragId(null);setDropId(null);};

  const dragHandlersFor = (id) => ({
    onDragStart: onDragStart(id),
    onDragOver: onDragOver(id),
    onDragLeave: onDragLeave(),
    onDrop: onDrop(id),
    onDragEnd
  });

  // ── CRUD ───────────────────────────────────────────────────────────────────
  const saveApp = (data) => {
    setApps((prev) => {
      if (data.id) return prev.map((a) => a.id === data.id ? { ...a, ...data } : a);
      return [...prev, { ...data, id: Date.now() }];
    });
    setModal(null);
  };
  const deleteApp = (app) => {
    setApps((prev) => prev.filter((a) => a.id !== app.id));
    setConfirmDel(null);
  };

  // ── Tweak-driven CSS vars ──────────────────────────────────────────────────
  const accent = t.accent;
  const bgVar = {
    cream: 'oklch(0.985 0.008 85)',
    cool: 'oklch(0.985 0.005 240)',
    pure: '#ffffff',
    mint: 'oklch(0.98 0.015 160)',
    lilac: 'oklch(0.98 0.015 290)'
  }[t.background] || 'oklch(0.985 0.008 85)';

  const density = { compact: 14, regular: 22, comfy: 32 }[t.density];

  const fontStack = {
    'Plus Jakarta Sans': "'Plus Jakarta Sans', system-ui, sans-serif",
    'Space Grotesk': "'Space Grotesk', system-ui, sans-serif",
    'Geist': "'Geist', system-ui, sans-serif",
    'Manrope': "'Manrope', system-ui, sans-serif"
  }[t.font] || "'Plus Jakarta Sans', system-ui, sans-serif";

  const accentHex = COLORS[accent]?.tile || COLORS.indigo.tile;

  const rootStyle = {
    '--bg': bgVar,
    '--accent': accent,
    '--accent-color': accentHex,
    '--density': density + 'px',
    '--font': fontStack
  };

  // Map hex -> key for TweakColor (which works with hex strings)
  const ACCENT_OPTIONS = ['blue', 'indigo', 'violet', 'emerald', 'amber', 'rose'];
  const accentHexList = ACCENT_OPTIONS.map((k) => COLORS[k].tile);
  const hexToKey = (hex) => ACCENT_OPTIONS.find((k) => COLORS[k].tile === hex) || 'indigo';

  // ── Render apps area depending on layout ───────────────────────────────────
  const renderApps = () => {
    if (filtered.length === 0) {
      return (
        <div className="empty">
          <i className="ph ph-magnifying-glass"></i>
          <p>Niciun rezultat pentru „{query}"</p>
        </div>);

    }

    if (t.layout === 'list') {
      return (
        <div className="list">
          {filtered.map((app) =>
          <AppRow
            key={app.id}
            app={app}
            accent={accent}
            onLaunch={launchApp}
            onEdit={(a) => setModal({ mode: 'edit', app: a })}
            onDelete={(a) => setConfirmDel(a)}
            dragHandlers={dragHandlersFor(app.id)}
            isDragging={dragId === app.id}
            isDropTarget={dropId === app.id && dragId !== app.id} />

          )}
        </div>);

    }

    if (t.layout === 'dock') {
      return (
        <div className="dock-wrap">
          <div className="dock">
            {filtered.map((app) =>
            <AppTile
              key={app.id}
              app={app}
              size={t.iconSize}
              accent={accent}
              onLaunch={launchApp}
              onEdit={(a) => setModal({ mode: 'edit', app: a })}
              onDelete={(a) => setConfirmDel(a)}
              dragHandlers={dragHandlersFor(app.id)}
              isDragging={dragId === app.id}
              isDropTarget={dropId === app.id && dragId !== app.id} />

            )}
            <button className="dock-add" onClick={() => setModal({ mode: 'add' })} title="Adaugă">
              <i className="ph ph-plus"></i>
            </button>
          </div>
        </div>);

    }

    // grid (default)
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '24px' }}>
        <div className="grid" style={{ width: '100%' }}>
          {filtered.map((app) =>
          <AppTile
            key={app.id}
            app={app}
            size={t.iconSize}
            accent={accent}
            onLaunch={launchApp}
            onEdit={(a) => setModal({ mode: 'edit', app: a })}
            onDelete={(a) => setConfirmDel(a)}
            dragHandlers={dragHandlersFor(app.id)}
            isDragging={dragId === app.id}
            isDropTarget={dropId === app.id && dragId !== app.id} />
          )}
        </div>
      </div>);

  };

  return (
    <div className="root" style={rootStyle} data-screen-label="01 Launcher">
      {/* Soft ambient backdrop blobs for spatial depth */}
      <div className="ambient" aria-hidden="true">
        <span className="blob blob-1" style={{ background: COLORS[accent]?.soft || 'oklch(0.96 0.04 250)' }}></span>
        <span className="blob blob-2"></span>
        <span className="blob blob-3"></span>
      </div>

      {/* Top bar */}
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark" style={{ background: COLORS[accent]?.tile }}></span>
          <span className="brand-name">Launcher</span>
        </div>
        <div className="topbar-meta">
          <span className="meta-time">{fmtTime(now)}</span>
          <span className="meta-dot">·</span>
          <span className="meta-date">{fmtDate(now)}</span>
        </div>
      </header>

      {/* Hero */}
      <section className="hero">
        <div className="hero-greeting">
          <img
            src="uploads/pasted-1779108507602-0.png"
            alt="Stema CNA"
            style={{
              height: '72px',
              width: 'auto',
              objectFit: 'contain',
              marginBottom: '4px',
              filter: 'drop-shadow(0 2px 8px rgba(15,23,42,0.10))'
            }} />
          <span className="greet-line" style={{ fontSize: "30px", textAlign: "center" }}>Agenția de Recuperare a Bunurilor Infracționale</span>
          <span className="greet-sub">{fmtDate(now)}, ora {fmtTime(now)}</span>
        </div>

        <div className={`search ${query ? 'has-query' : ''}`}>
          <i className="ph ph-magnifying-glass search-ico"></i>
          <input
            ref={searchRef}
            type="search"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={onSearchKey}
            placeholder="Caută aplicație sau scrie pentru a filtra…"
            spellCheck={false}
            autoComplete="off" />
          
          {query ?
          <button className="search-clear" onClick={() => {setQuery('');searchRef.current?.focus();}} title="Șterge">
              <i className="ph ph-x"></i>
            </button> :

          <span className="kbd">
              <span className="kbd-key">⌘</span>
              <span className="kbd-key">K</span>
            </span>
          }
        </div>

        <div className="hero-row">
          <span className="hero-count">{filtered.length} {filtered.length === 1 ? 'aplicație' : 'aplicații'}{query ? ' găsite' : ''}</span>
          <div className="layout-toggle" role="tablist" aria-label="Layout">
            {[
            { id: 'grid', icon: 'ph-grid-four', label: 'Grilă' },
            { id: 'list', icon: 'ph-list-bullets', label: 'Listă' },
            { id: 'dock', icon: 'ph-dots-nine', label: 'Dock' }].
            map((o) =>
            <button
              key={o.id}
              className={`lt ${t.layout === o.id ? 'is-active' : ''}`}
              onClick={() => setTweak('layout', o.id)}
              title={o.label}
              style={{ '--accent': accent }}>
              
                <i className={`ph ${o.icon}`}></i>
                <span>{o.label}</span>
              </button>
            )}
          </div>
          <button className="hero-add" onClick={() => setModal({ mode: 'add' })} style={{ background: COLORS[accent]?.tile }}>
            <i className="ph ph-plus"></i>
            <span>Adaugă</span>
          </button>
        </div>
      </section>

      {/* Apps */}
      <main className="apps-section">
        {renderApps()}
      </main>

      {/* Footer hint */}
      <footer className="foot">
        <span><kbd>⌘</kbd> + <kbd>K</kbd> caută</span>
        <span className="dotsep">·</span>
        <span><kbd>Enter</kbd> deschide</span>
        <span className="dotsep">·</span>
        <span>trage pentru a rearanja</span>
      </footer>

      {/* Modal */}
      {modal &&
      <AddEditModal
        mode={modal.mode}
        app={modal.app}
        accent={accent}
        onClose={() => setModal(null)}
        onSave={saveApp} />

      }

      {/* Delete confirm */}
      {confirmDel &&
      <ConfirmModal
        title="Șterge aplicația?"
        body={<p>Vrei să ștergi <b>{confirmDel.name}</b>? Acțiunea nu poate fi anulată.</p>}
        confirmLabel="Șterge"
        onCancel={() => setConfirmDel(null)}
        onConfirm={() => deleteApp(confirmDel)} />

      }

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Aspect" />
        <TweakRadio
          label="Layout"
          value={t.layout}
          options={['grid', 'list', 'dock']}
          onChange={(v) => setTweak('layout', v)} />
        
        <TweakRadio
          label="Dimensiune iconițe"
          value={t.iconSize}
          options={['sm', 'md', 'lg']}
          onChange={(v) => setTweak('iconSize', v)} />
        
        <TweakRadio
          label="Densitate"
          value={t.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)} />
        

        <TweakSection label="Temă" />
        <TweakColor
          label="Accent"
          value={accentHex}
          options={accentHexList}
          onChange={(hex) => setTweak('accent', hexToKey(hex))} />
        
        <TweakSelect
          label="Fundal"
          value={t.background}
          options={[
          { value: 'cream', label: 'Cremă caldă' },
          { value: 'cool', label: 'Gri rece' },
          { value: 'pure', label: 'Alb pur' },
          { value: 'mint', label: 'Mentă' },
          { value: 'lilac', label: 'Lila' }]
          }
          onChange={(v) => setTweak('background', v)} />
        
        <TweakSelect
          label="Font"
          value={t.font}
          options={['Plus Jakarta Sans', 'Space Grotesk', 'Geist', 'Manrope']}
          onChange={(v) => setTweak('font', v)} />
        

        <TweakSection label="Date" />
        <TweakButton label="Resetează la default" onClick={() => {
          if (confirm('Resetezi lista de aplicații la cea inițială?')) {
            setApps([...DEFAULT_APPS]);
          }
        }} />
      </TweaksPanel>
    </div>);

}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL — Add / Edit
// ─────────────────────────────────────────────────────────────────────────────
function AddEditModal({ mode, app, accent, onClose, onSave }) {
  const [name, setName] = useState(app?.name || '');
  const [url, setUrl] = useState(app?.url || '');
  const [color, setColor] = useState(app?.color || 'blue');
  const [icon, setIcon] = useState(app?.icon || ICONS[0].id);
  const [iconQuery, setIconQuery] = useState('');
  // Track whether the user manually picked an icon (so we don't auto-override it)
  const userPickedIconRef = useRef(!!app?.icon);
  // urlMode: 'file' | 'web' — initialise from the existing URL
  const [urlMode, setUrlMode] = useState(() =>
    /^https?:\/\//i.test(app?.url || '') ? 'web' : 'file'
  );
  const nameRef = useRef(null);
  const fileRef = useRef(null);

  const isWeb = urlMode === 'web';

  useEffect(() => {setTimeout(() => nameRef.current?.focus(), 80);}, []);

  // When the user switches mode tabs
  const switchMode = (newMode) => {
    setUrlMode(newMode);
    if (newMode === 'web') {
      // Prefill https:// if there's no web URL already
      if (!/^https?:\/\//i.test(url)) setUrl('https://');
      // Auto-suggest globe icon if the user hasn't manually picked one
      if (!userPickedIconRef.current) setIcon('ph-globe');
    } else {
      // Going back to file mode: clear if it was a web URL
      if (/^https?:\/\//i.test(url)) setUrl('');
    }
  };

  const handleUrlChange = (newUrl) => {
    setUrl(newUrl);
    // Auto-sync mode when user types a URL
    if (/^https?:\/\//i.test(newUrl) && urlMode !== 'web') {
      setUrlMode('web');
      if (!userPickedIconRef.current) setIcon('ph-globe');
    } else if (!/^https?:\/\//i.test(newUrl) && urlMode !== 'file') {
      setUrlMode('file');
    }
  };

  const handleIconPick = (id) => {
    setIcon(id);
    userPickedIconRef.current = true;
  };

  const submit = (e) => {
    e.preventDefault();
    if (!name.trim() || !url.trim()) return;
    onSave({ ...(app || {}), id: app?.id, name: name.trim(), url: url.trim(), color, icon });
  };

  const filteredIcons = useMemo(() => {
    const q = norm(iconQuery);
    return q ? ICONS.filter((i) => norm(i.label).includes(q) || norm(i.id).includes(q)) : ICONS;
  }, [iconQuery]);

  // Styles for the mode toggle tabs
  const modeTabBase = {
    display: 'inline-flex', alignItems: 'center', gap: '5px',
    padding: '5px 12px', fontSize: '12px', fontWeight: 600,
    border: '1px solid rgba(15,23,42,0.10)', borderRadius: '8px',
    cursor: 'default', transition: 'all 0.15s ease', background: 'transparent',
    color: 'oklch(0.45 0.01 80)',
  };
  const modeTabActive = {
    ...modeTabBase,
    background: 'white',
    color: 'oklch(0.22 0.01 80)',
    boxShadow: '0 1px 3px rgba(15,23,42,0.10)',
    borderColor: 'rgba(15,23,42,0.12)',
  };

  return (
    <div className="modal-back" onClick={onClose}>
      <form className="modal" onClick={(e) => e.stopPropagation()} onSubmit={submit} style={{ '--accent': COLORS[accent].tile, '--accent-ring': COLORS[accent].ring }}>
        <header className="modal-head">
          <h3>{mode === 'edit' ? 'Editează aplicația' : 'Adaugă aplicație nouă'}</h3>
          <button type="button" className="modal-close" onClick={onClose}><i className="ph ph-x"></i></button>
        </header>

        <div className="modal-body">
          {/* Preview */}
          <div className="modal-preview">
            <div className="prev-tile" style={{
              background: COLORS[color].tile,
              boxShadow: `inset 0 1px 0 rgba(255,255,255,0.35), 0 8px 22px ${COLORS[color].tile.replace(')', ' / 0.30)')}`
            }}>
              <i className={`ph ${icon}`}></i>
            </div>
            <div className="prev-meta">
              <span className="prev-name">{name || 'Nume aplicație'}</span>
              <span className="prev-url" style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                {isWeb
                  ? <><i className="ph ph-globe" style={{ fontSize: '11px', flexShrink: 0 }}></i>{url || 'https://…'}</>
                  : <><i className="ph ph-file-html" style={{ fontSize: '11px', flexShrink: 0 }}></i>{url || './cale.html'}</>
                }
              </span>
            </div>
            {/* Web / Local badge */}
            <span style={{
              fontSize: '10px', fontWeight: 600, letterSpacing: '0.04em',
              padding: '2px 7px', borderRadius: '999px',
              background: isWeb ? 'oklch(0.94 0.05 250)' : 'oklch(0.94 0.03 145)',
              color: isWeb ? 'oklch(0.40 0.18 250)' : 'oklch(0.38 0.14 145)',
              flexShrink: 0,
            }}>
              {isWeb ? '🌐 Web' : '📁 Local'}
            </span>
          </div>

          <div className="field">
            <label>Nume</label>
            <input ref={nameRef} value={name} onChange={(e) => setName(e.target.value)} required maxLength={40}
            placeholder="ex: Calculator Salarii" />
          </div>

          <div className="field">
            {/* Mode toggle */}
            <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
              <button type="button"
                style={!isWeb ? modeTabActive : modeTabBase}
                onClick={() => switchMode('file')}>
                <i className="ph ph-file-html"></i> Fișier local
              </button>
              <button type="button"
                style={isWeb ? modeTabActive : modeTabBase}
                onClick={() => switchMode('web')}>
                <i className="ph ph-globe"></i> Pagina web
              </button>
            </div>

            <label>{isWeb ? 'Adresa web (URL)' : 'Calea fișierului'}</label>
            <div className="field-row" style={{ position: 'relative' }}>
              {isWeb && (
                <span style={{
                  position: 'absolute', left: '12px', top: '50%',
                  transform: 'translateY(-50%)', color: 'oklch(0.55 0.10 250)',
                  pointerEvents: 'none', zIndex: 1, fontSize: '15px',
                }}>
                  <i className="ph ph-globe"></i>
                </span>
              )}
              <input
                value={url}
                onChange={(e) => handleUrlChange(e.target.value)}
                required
                style={{ paddingLeft: isWeb ? '34px' : '14px' }}
                placeholder={isWeb ? 'https://example.com' : './aplicatia.html'}
                inputMode={isWeb ? 'url' : 'text'}
                autoComplete={isWeb ? 'url' : 'off'}
              />
              {!isWeb && (
                <button type="button" className="btn-ghost" onClick={() => fileRef.current?.click()}>
                  <i className="ph ph-folder-open"></i> Răsfoiește
                </button>
              )}
              <input ref={fileRef} type="file" accept=".html,.htm" hidden
                onChange={(e) => {const f = e.target.files?.[0];if (f) {setUrl('./' + f.name); setUrlMode('file');}}} />
            </div>

            <p className="hint">
              {isWeb ? (
                <><i className="ph ph-globe"></i> Pagina web se va deschide în tab nou. Ex: <code>https://google.com</code></>
              ) : (
                <><i className="ph ph-info"></i> Plasează fișierele lângă portal sau calea completă: <code>file:///C:/cale/app.html</code></>
              )}
            </p>
          </div>

          <div className="field">
            <label>Culoare</label>
            <div className="color-row">
              {COLOR_KEYS.map((k) =>
              <button type="button" key={k} className={`color-sw ${color === k ? 'is-on' : ''}`}
              onClick={() => setColor(k)} style={{ background: COLORS[k].tile }}
              aria-label={k} title={k}></button>
              )}
            </div>
          </div>

          <div className="field">
            <label>Iconiță</label>
            <div className="icon-search">
              <i className="ph ph-magnifying-glass"></i>
              <input type="search" placeholder="Caută iconiță..." value={iconQuery}
              onChange={(e) => setIconQuery(e.target.value)} />
            </div>
            <div className="icon-grid">
              {filteredIcons.map(({ id, label }) =>
              <button type="button" key={id} className={`icon-pick ${icon === id ? 'is-on' : ''}`}
              onClick={() => handleIconPick(id)} title={label}>
                  <i className={`ph ${id}`}></i>
                </button>
              )}
              {filteredIcons.length === 0 &&
              <p className="icon-empty">Niciun rezultat.</p>
              }
            </div>
          </div>
        </div>

        <footer className="modal-foot">
          <button type="button" className="btn-ghost" onClick={onClose}>Anulează</button>
          <button type="submit" className="btn-primary" style={{ background: COLORS[accent].tile }}>
            {mode === 'edit' ? 'Salvează' : 'Adaugă aplicația'}
          </button>
        </footer>
      </form>
    </div>);

}

function ConfirmModal({ title, body, confirmLabel, onCancel, onConfirm }) {
  return (
    <div className="modal-back" onClick={onCancel}>
      <div className="modal modal-sm" onClick={(e) => e.stopPropagation()}>
        <header className="modal-head">
          <h3>{title}</h3>
          <button type="button" className="modal-close" onClick={onCancel}><i className="ph ph-x"></i></button>
        </header>
        <div className="modal-body">{body}</div>
        <footer className="modal-foot">
          <button type="button" className="btn-ghost" onClick={onCancel}>Anulează</button>
          <button type="button" className="btn-danger" onClick={onConfirm}>{confirmLabel}</button>
        </footer>
      </div>
    </div>);

}

// ── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
