<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARBI — Registru Cooperare Internațională</title>

  <!-- CDN: nu necesită npm sau build -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase CDN -->
  <script type="module">
    import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged }
                                    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp }
                                    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    window.__firebase = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
      getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp };
  </script>

  <!-- ================================================================
       CONFIGURARE FIREBASE
       Completează cu datele din consola Firebase:
       https://console.firebase.google.com → Project Settings → Your apps
       ================================================================ -->
  <script>
    window.__firebase_config = JSON.stringify({
      apiKey:            "INLOCUIESTE_CU_API_KEY",
      authDomain:        "PROIECT.firebaseapp.com",
      projectId:         "PROIECT",
      storageBucket:     "PROIECT.appspot.com",
      messagingSenderId: "000000000000",
      appId:             "1:000000000000:web:000000000000000000000000"
    });
    window.__app_id = 'arbi-contacts-v7';
    window.__initial_auth_token = '';
    // Cheia Gemini NU se pune aici — se introduce din aplicație (buton ⚙️)
  </script>
</head>
<body class="bg-[#f8fafc]">
  <div id="root">
    <div style="min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;">
      <div style="width:48px;height:48px;border:4px solid #f59e0b;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      <p style="font-size:10px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;">Se încarcă ARBI...</p>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    /* =========================================================
       CODUL APLICAȚIEI — generat din contacts_v7.jsx
       Nu modifica manual; editează contacts_v7.jsx și regenerează
       ========================================================= */
    const { useState, useEffect, useMemo, useRef } = React;

    // Re-export Firebase din modulul injectat global
    const {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
      getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp
    } = window.__firebase || {};

    const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
    const appId     = window.__app_id || 'arbi-contacts-v7';
    const MODEL_NAME = 'gemini-2.5-flash-preview-09-2025';
    const getApiKey  = () =>
      (window.__gemini_api_key) || (localStorage.getItem('arbi_gemini_key') || '');

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ORG_TYPES = [
      { value: '', label: 'Selectați tipul...' },
      { value: 'ONU',              label: 'ONU / UN',          color: 'bg-blue-100 text-blue-800' },
      { value: 'UE',               label: 'UE / EU',           color: 'bg-indigo-100 text-indigo-800' },
      { value: 'NATO',             label: 'NATO',              color: 'bg-cyan-100 text-cyan-800' },
      { value: 'INTERPOL',         label: 'INTERPOL',          color: 'bg-red-100 text-red-800' },
      { value: 'CARIN',            label: 'CARIN',             color: 'bg-purple-100 text-purple-800' },
      { value: 'SIENA',            label: 'SIENA',             color: 'bg-violet-100 text-violet-800' },
      { value: 'Europol',          label: 'Europol',           color: 'bg-sky-100 text-sky-800' },
      { value: 'Eurojust',         label: 'Eurojust',          color: 'bg-teal-100 text-teal-800' },
      { value: 'Consiliul Europei',label: 'Consiliul Europei', color: 'bg-amber-100 text-amber-800' },
      { value: 'OLAF',             label: 'OLAF',              color: 'bg-orange-100 text-orange-800' },
      { value: 'Bilateral',        label: 'Bilateral',         color: 'bg-emerald-100 text-emerald-800' },
      { value: 'National',         label: 'Național',          color: 'bg-slate-100 text-slate-700' },
      { value: 'Alta',             label: 'Alta',              color: 'bg-gray-100 text-gray-700' },
    ];
    const getOrgTypeStyle = v => (ORG_TYPES.find(t => t.value === v) || {}).color || 'bg-slate-100 text-slate-600';

    const compressImage = (b64, mw = 800, mh = 800) => new Promise(resolve => {
      const img = new Image();
      img.src = b64;
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > mw) { h *= mw/w; w = mw; } }
        else       { if (h > mh) { w *= mh/h; h = mh; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.6));
      };
    });

    const GlobalStyles = () => (
      <style>{`
        .no-scrollbar::-webkit-scrollbar{display:none}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        @keyframes fadeInZoom{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-animate{animation:fadeInZoom .2s ease-out}
        @media print{.print-hidden{display:none!important}}
      `}</style>
    );

    const IconPlus  = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const IconCloud = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.799-2.084-5.11-4.814-5.455C17.18 4.545 13.903 2 10 2 6.136 2 2.864 4.887 2.115 8.657.942 9.577 0 11.196 0 13c0 3.314 2.686 6 6 6h11.5z"/></svg>;
    const IconDl    = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconEdit  = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
    const IconCard  = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h0M2 9.5h20"/></svg>;

    function App() {
      const [user,setSyncUser]             = useState(null);
      const [contacts,setContacts]         = useState([]);
      const [loading,setLoading]           = useState(true);
      const [isSaving,setIsSaving]         = useState(false);
      const [syncStatus,setSyncStatus]     = useState('connecting');
      const [lastSync,setLastSync]         = useState(null);
      const [searchTerm,setSearchTerm]     = useState('');
      const [selectedCountry,setSelectedCountry] = useState('Toate');
      const [selectedOrgType,setSelectedOrgType] = useState('Toate');
      const [isModalOpen,setIsModalOpen]   = useState(false);
      const [isSettingsOpen,setIsSettingsOpen] = useState(false);
      const [apiKeyInput,setApiKeyInput]   = useState('');
      const [isScanning,setIsScanning]     = useState(false);
      const [viewPhoto,setViewPhoto]       = useState(null);
      const [statusMessage,setStatusMessage] = useState('');
      const [editingId,setEditingId]       = useState(null);
      const cam1Ref = useRef(null); const gal1Ref = useRef(null);
      const cam2Ref = useRef(null); const gal2Ref = useRef(null);

      const blank = { name:'',role:'',organization:'',country:'',email:'',phone:'',
        website:'',address:'',eventName:'',eventDate:'',eventLocation:'',
        arbiEmployee:'',notes:'',photo1:null,photo2:null,cardPhoto:null,organizationType:'' };
      const [form,setForm] = useState(blank);

      useEffect(() => {
        const go = async () => {
          try { await signInAnonymously(auth); }
          catch(e) { console.error(e); setSyncStatus('error'); }
        };
        go();
        return onAuthStateChanged(auth, setSyncUser);
      }, []);

      useEffect(() => {
        if (!user) return;
        const ref = collection(db,'artifacts',appId,'public','data','contacts');
        return onSnapshot(ref, snap => {
          setContacts(snap.docs.map(d=>({...d.data(),id:d.id}))
            .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
          setSyncStatus('synced');
          setLastSync(new Date().toLocaleTimeString());
          setLoading(false);
        }, err => { console.error(err); setSyncStatus('error'); setLoading(false); });
      }, [user]);

      const extractDataWithAI = async b64 => {
        const key = getApiKey();
        if (!key) { setStatusMessage('Introduceți cheia Gemini din ⚙️ Setări'); setTimeout(()=>setStatusMessage(''),4000); return; }
        setIsScanning(true);
        setStatusMessage('Inteligența Artificială analizează documentul...');
        try {
          const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`,{
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ contents:[{parts:[
              {text:'Ești un asistent ARBI SCI. Extrage: name,role,organization,country,email,phone,website,address,notes. Returnează JSON valid.'},
              {inlineData:{mimeType:'image/png',data:b64.split(',')[1]}}
            ]}], generationConfig:{responseMimeType:'application/json'} })
          });
          const res = await r.json();
          const raw = res?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!raw) throw new Error('empty');
          setForm(p=>({...p,...JSON.parse(raw)}));
          setStatusMessage('Date extrase cu succes!');
        } catch { setStatusMessage('Eroare AI. Completați manual.'); }
        finally { setIsScanning(false); setTimeout(()=>setStatusMessage(''),3000); }
      };

      const handlePhotoUpload = (e, slot) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onloadend = () => { setForm(p=>({...p,[`photo${slot}`]:r.result})); if(slot===1&&f.type.startsWith('image/')) extractDataWithAI(r.result); };
        r.readAsDataURL(f); e.target.value='';
      };

      const handleSave = async e => {
        e.preventDefault(); if(!user||!form.name||isSaving) return;
        setIsSaving(true); setStatusMessage('Sincronizare Cloud...');
        try {
          let data={...form};
          if(data.photo1&&data.photo1.length>50000) data.photo1=await compressImage(data.photo1);
          if(data.photo2&&data.photo2.length>50000) data.photo2=await compressImage(data.photo2);
          if(data.cardPhoto&&data.cardPhoto.length>50000) data.cardPhoto=await compressImage(data.cardPhoto);
          const ref=collection(db,'artifacts',appId,'public','data','contacts');
          if(editingId) await updateDoc(doc(db,'artifacts',appId,'public','data','contacts',editingId),{...data,updatedAt:serverTimestamp()});
          else          await addDoc(ref,{...data,createdAt:serverTimestamp(),authorId:user.uid});
          setIsModalOpen(false); setForm(blank); setEditingId(null);
        } catch(err) { console.error(err); setStatusMessage('Eroare la salvare.'); }
        finally { setIsSaving(false); }
      };

      const exportExcel = () => {
        const hdr=['Nume','Organizatie','Tip Org','Rol','Tara','Email','Telefon','Website','Adresa','Ofiter ARBI','Eveniment','Data'];
        const rows=filtered.map(c=>[c.name,c.organization,c.organizationType,c.role,c.country,c.email,c.phone,c.website,c.address,c.arbiEmployee,c.eventName,c.eventDate]);
        const csv=[hdr,...rows].map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download=`Registru_ARBI_${new Date().toLocaleDateString('ro-RO')}.csv`; a.click();
        URL.revokeObjectURL(url);
      };

      const countries = useMemo(()=>['Toate',...[...new Set(contacts.map(c=>c.country).filter(Boolean))].sort()],[contacts]);
      const orgTypes  = useMemo(()=>['Toate',...[...new Set(contacts.map(c=>c.organizationType).filter(Boolean))].sort()],[contacts]);
      const filtered  = useMemo(()=>contacts.filter(c=>
        (selectedCountry==='Toate'||c.country===selectedCountry)&&
        (selectedOrgType==='Toate'||c.organizationType===selectedOrgType)&&
        ((c.name||'').toLowerCase().includes(searchTerm.toLowerCase())||
         (c.organization||'').toLowerCase().includes(searchTerm.toLowerCase())||
         (c.role||'').toLowerCase().includes(searchTerm.toLowerCase()))
      ),[contacts,searchTerm,selectedCountry,selectedOrgType]);

      if(loading) return (
        <div className="min-h-screen bg-[#0f172a] flex flex-col items-center justify-center text-white">
          <GlobalStyles/><div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="font-bold uppercase text-[10px] tracking-widest animate-pulse">Sincronizare Cloud ARBI...</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-[#f8fafc] text-slate-900 pb-24 font-sans">
          <GlobalStyles/>

          {/* Navbar */}
          <nav className="bg-[#0f172a] text-white px-6 py-4 shadow-xl border-b-4 border-amber-500 sticky top-0 z-50 print-hidden">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-4">
                <div className="bg-white text-[#0f172a] p-1.5 rounded font-black text-[10px] px-2">ARBI</div>
                <div>
                  <h1 className="text-sm font-bold uppercase tracking-wider leading-none">Cooperare Internațională</h1>
                  <span className={`flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest mt-1.5 ${syncStatus==='synced'?'text-emerald-400':'text-amber-500'}`}>
                    <IconCloud/> {syncStatus==='synced'?`Sincronizat: ${lastSync}`:'Se conectează...'}
                  </span>
                </div>
              </div>
              <div className="flex gap-2 w-full md:w-auto">
                <button onClick={()=>{setApiKeyInput(localStorage.getItem('arbi_gemini_key')||'');setIsSettingsOpen(true);}} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all" title="Setări cheie Gemini">⚙️</button>
                <button onClick={exportExcel} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all">XLS</button>
                <button onClick={()=>window.print()} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all">Raport</button>
                <button onClick={()=>{setEditingId(null);setForm(blank);setIsModalOpen(true);}} className="flex-1 md:flex-none bg-amber-500 hover:bg-amber-600 text-[#0f172a] px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all flex items-center gap-2"><IconPlus/> Adaugă</button>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-6 mt-8">
            {/* Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              {[{l:'Total Contacte',v:contacts.length,c:'text-slate-800'},{l:'Țări',v:countries.length-1,c:'text-slate-800'},{l:'Tip Organizații',v:orgTypes.length-1,c:'text-slate-800'},{l:'Cu Fotografii',v:contacts.filter(c=>c.photo1||c.photo2||c.cardPhoto).length,c:'text-amber-500'}].map(s=>(
                <div key={s.l} className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm">
                  <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{s.l}</p>
                  <p className={`text-3xl font-black mt-1 ${s.c}`}>{s.v}</p>
                </div>
              ))}
            </div>

            {/* Filtru țări */}
            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm mb-4 border border-slate-200 print-hidden overflow-x-auto no-scrollbar">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Filtrare după Țară</p>
              <div className="flex gap-2">
                {countries.map(c=>(
                  <button key={c} onClick={()=>setSelectedCountry(c)} className={`px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border-2 shrink-0 ${selectedCountry===c?'bg-amber-500 border-amber-500 text-[#0f172a] shadow-lg':'bg-slate-50 border-slate-100 text-slate-400 hover:border-slate-300'}`}>
                    {c} {c!=='Toate'&&`(${contacts.filter(i=>i.country===c).length})`}
                  </button>
                ))}
              </div>
            </div>

            {/* Filtru org type */}
            {orgTypes.length>1&&(
              <div className="bg-white p-6 rounded-[2.5rem] shadow-sm mb-8 border border-slate-200 print-hidden overflow-x-auto no-scrollbar">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Filtrare după Tip Organizație</p>
                <div className="flex gap-2">
                  {orgTypes.map(t=>(
                    <button key={t} onClick={()=>setSelectedOrgType(t)} className={`px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border-2 shrink-0 ${selectedOrgType===t?'bg-[#0f172a] border-[#0f172a] text-white shadow-lg':'bg-slate-50 border-slate-100 text-slate-400 hover:border-slate-300'}`}>
                      {t} {t!=='Toate'&&`(${contacts.filter(i=>i.organizationType===t).length})`}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Search */}
            <div className="relative mb-8 max-w-2xl mx-auto print-hidden">
              <div className="absolute inset-y-0 left-5 flex items-center text-slate-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </div>
              <input type="text" placeholder="Caută după nume, instituție sau funcție..." className="w-full pl-14 pr-6 py-5 rounded-[2rem] border-none shadow-sm outline-none text-sm bg-white focus:ring-4 focus:ring-amber-500/10 transition-all" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
            </div>

            {/* Empty state */}
            {filtered.length===0&&(
              <div className="text-center py-24">
                <div className="w-20 h-20 bg-slate-100 rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-6">🌍</div>
                <p className="text-lg font-black text-slate-700 uppercase tracking-wider">Niciun contact găsit</p>
                <p className="text-sm text-slate-400 mt-2">{searchTerm||selectedCountry!=='Toate'||selectedOrgType!=='Toate'?'Modificați filtrele sau căutarea':'Adăugați primul contact internațional'}</p>
                {!searchTerm&&selectedCountry==='Toate'&&selectedOrgType==='Toate'&&(
                  <button onClick={()=>{setEditingId(null);setForm(blank);setIsModalOpen(true);}} className="mt-6 bg-amber-500 text-[#0f172a] px-8 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg hover:bg-amber-600 transition-all">+ Adaugă Contact</button>
                )}
              </div>
            )}

            {/* Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              {filtered.map(c=>(
                <div key={c.id} className="bg-white rounded-[3rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all relative group flex flex-col print:break-inside-avoid">
                  {(c.photo1||c.photo2||c.cardPhoto)&&(()=>{
                    const p1=c.photo1||c.cardPhoto; const p2=c.photo2;
                    return (
                      <div className={`grid ${p1&&p2?'grid-cols-2':'grid-cols-1'} h-32 overflow-hidden shrink-0`}>
                        {p1&&<div className="relative cursor-pointer overflow-hidden" onClick={()=>setViewPhoto(p1)}><img src={p1} className="w-full h-full object-cover hover:scale-105 transition-transform duration-300" alt="Foto 1"/><div className="absolute bottom-2 left-2"><span className="text-[8px] text-white font-black bg-black/40 backdrop-blur px-2 py-0.5 rounded-full">📷 Foto 1</span></div></div>}
                        {p2&&<div className="relative cursor-pointer overflow-hidden border-l border-white/20" onClick={()=>setViewPhoto(p2)}><img src={p2} className="w-full h-full object-cover hover:scale-105 transition-transform duration-300" alt="Foto 2"/><div className="absolute bottom-2 left-2"><span className="text-[8px] text-white font-black bg-black/40 backdrop-blur px-2 py-0.5 rounded-full">📷 Foto 2</span></div></div>}
                      </div>
                    );
                  })()}
                  <div className="absolute top-6 right-6 flex gap-2 z-10 print-hidden" style={(c.photo1||c.photo2||c.cardPhoto)?{top:'140px'}:{}}>
                    <button onClick={()=>{setEditingId(c.id);setForm(c);setIsModalOpen(true);}} className="p-3 bg-white/90 backdrop-blur shadow-sm rounded-2xl text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all"><IconEdit/></button>
                    <button onClick={async()=>{if(confirm('Ștergeți din baza de date ARBI?'))await deleteDoc(doc(db,'artifacts',appId,'public','data','contacts',c.id));}} className="p-3 bg-white/90 backdrop-blur shadow-sm rounded-2xl text-rose-500 hover:bg-rose-500 hover:text-white transition-all"><IconTrash/></button>
                  </div>
                  <div className="p-8 pb-4">
                    <div className="flex items-start gap-4 mb-6">
                      <div className="w-16 h-16 bg-[#0f172a] text-white rounded-[1.5rem] flex items-center justify-center font-black text-2xl shadow-xl shadow-slate-200 shrink-0">{(c.name?.charAt(0)||'?').toUpperCase()}</div>
                      <div className="min-w-0 flex-1">
                        <h3 className="text-xl font-black text-slate-800 leading-tight truncate">{c.name}</h3>
                        <p className="text-amber-600 text-[10px] font-black uppercase tracking-[0.15em] mt-1">{c.role||'—'}</p>
                        {c.organizationType&&<span className={`inline-block mt-2 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${getOrgTypeStyle(c.organizationType)}`}>{c.organizationType}</span>}
                      </div>
                    </div>
                    <div className="space-y-3">
                      <div className="flex items-center gap-3 text-slate-800 text-sm font-bold bg-slate-50 p-4 rounded-2xl border border-slate-100">🏛️ <span className="truncate">{c.organization||'—'}</span></div>
                      <div className="grid grid-cols-1 gap-1 text-[11px] text-slate-500 font-semibold ml-2">
                        {c.email&&<span>📧 {c.email}</span>}{c.phone&&<span>📞 {c.phone}</span>}
                      </div>
                    </div>
                  </div>
                  <div className="p-8 pt-4 flex-grow flex flex-col justify-between border-t border-slate-50 mt-4">
                    <div className="bg-indigo-50/40 p-5 rounded-[2rem] border border-indigo-100/50 mb-4">
                      <p className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">Ofițer ARBI Gestionar</p>
                      <p className="text-xs font-bold text-slate-800">{c.arbiEmployee||'—'}</p>
                      <p className="text-[10px] text-slate-400 mt-2 font-black uppercase">{c.eventName||'Nespecificat'}</p>
                    </div>
                    <span className="text-[9px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-black uppercase">{c.country||'—'}</span>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* Modal Adăugare/Editare */}
          {isModalOpen&&(
            <div className="fixed inset-0 bg-[#0f172a]/95 backdrop-blur-2xl z-50 p-4 overflow-y-auto flex items-center justify-center">
              <div className="bg-white rounded-[3.5rem] w-full max-w-5xl shadow-2xl my-6 overflow-hidden modal-animate">
                <div className="bg-[#0f172a] p-10 text-white flex justify-between items-center">
                  <div><h2 className="text-2xl font-black uppercase tracking-widest">{editingId?'Editare':'Înregistrare'} Cloud</h2>
                  <p className="text-amber-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2 flex items-center gap-2"><IconCloud/> Sincronizare ARBI SCI Activă</p></div>
                  <button onClick={()=>setIsModalOpen(false)} className="text-5xl font-thin hover:text-amber-500 transition-colors leading-none">&times;</button>
                </div>
                <form onSubmit={handleSave} className="p-10 lg:p-14 grid grid-cols-1 lg:grid-cols-2 gap-12">
                  <div className="space-y-8">
                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">I. Fotografii & Scanare AI</div>
                    <input type="file" hidden ref={cam1Ref} accept="image/*" capture="environment" onChange={e=>handlePhotoUpload(e,1)}/>
                    <input type="file" hidden ref={gal1Ref} accept="image/*" onChange={e=>handlePhotoUpload(e,1)}/>
                    <input type="file" hidden ref={cam2Ref} accept="image/*" capture="environment" onChange={e=>handlePhotoUpload(e,2)}/>
                    <input type="file" hidden ref={gal2Ref} accept="image/*" onChange={e=>handlePhotoUpload(e,2)}/>
                    <div className="grid grid-cols-2 gap-4">
                      {[1,2].map(slot=>{
                        const photo=form[`photo${slot}`]||(slot===1?form.cardPhoto:null);
                        const camR=slot===1?cam1Ref:cam2Ref; const galR=slot===1?gal1Ref:gal2Ref; const isAI=slot===1;
                        return (
                          <div key={slot} className="flex flex-col gap-3">
                            <div className={`relative w-full aspect-square rounded-[2rem] border-4 border-dashed overflow-hidden bg-slate-50 flex items-center justify-center transition-all ${isScanning&&isAI?'border-amber-400':'border-slate-100'}`}>
                              {photo?(
                                <>
                                  <img src={photo} className={`w-full h-full object-cover ${isScanning&&isAI?'opacity-20 blur-sm':''}`} alt={`Foto ${slot}`}/>
                                  {isScanning&&isAI&&<div className="absolute inset-0 flex items-center justify-center font-black text-amber-600 text-[10px] uppercase tracking-widest animate-pulse text-center px-2">Analiză AI...</div>}
                                  <button type="button" onClick={()=>setForm(p=>({...p,[`photo${slot}`]:null,...(slot===1?{cardPhoto:null}:{})}))} className="absolute top-2 right-2 w-8 h-8 bg-rose-500 text-white rounded-full text-sm font-black flex items-center justify-center shadow-lg hover:bg-rose-600 transition-colors">×</button>
                                </>
                              ):(
                                <div className="text-center p-4">
                                  <div className={`w-12 h-12 ${isAI?'bg-amber-100 text-amber-600':'bg-slate-100 text-slate-400'} rounded-[1rem] flex items-center justify-center mx-auto mb-3`}><IconCard/></div>
                                  <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Foto {slot}</p>
                                  {isAI&&<p className="text-[8px] text-amber-500 font-bold mt-1">✨ AI auto-complete</p>}
                                </div>
                              )}
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <button type="button" onClick={()=>camR.current.click()} className="py-3 bg-[#0f172a] hover:bg-slate-700 text-white rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1">📷 Cameră</button>
                              <button type="button" onClick={()=>galR.current.click()} className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1">🖼️ Galerie</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div className="bg-amber-50 p-8 rounded-[2.5rem] border border-amber-100">
                      <label className="block text-[11px] font-black text-amber-800 uppercase mb-3 tracking-widest">Ofițer ARBI Participant *</label>
                      <input required placeholder="Numele dumneavoastră..." className="w-full p-4 bg-white rounded-2xl text-sm font-black outline-none border border-amber-200 focus:border-amber-400 transition-colors" value={form.arbiEmployee} onChange={e=>setForm({...form,arbiEmployee:e.target.value})}/>
                    </div>
                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 space-y-3">
                      <label className="block text-[11px] font-black text-slate-500 uppercase tracking-widest">Context / Eveniment</label>
                      <input placeholder="Conferință, întâlnire bilaterală..." className="w-full p-4 bg-white rounded-2xl text-sm outline-none border border-slate-100 focus:border-slate-300 transition-colors" value={form.eventName} onChange={e=>setForm({...form,eventName:e.target.value})}/>
                      <input type="date" className="w-full p-4 bg-white rounded-2xl text-sm outline-none border border-slate-100 focus:border-slate-300 transition-colors" value={form.eventDate} onChange={e=>setForm({...form,eventDate:e.target.value})}/>
                    </div>
                  </div>
                  <div className="space-y-5">
                    <div className="text-[10px] font-black text-indigo-600 uppercase tracking-widest border-b border-indigo-100 pb-2 mb-2">II. Informații Complete Partener</div>
                    <input required placeholder="Nume Complet *" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                    <input required placeholder="Instituție / Organizație *" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.organization} onChange={e=>setForm({...form,organization:e.target.value})}/>
                    <div className="grid grid-cols-2 gap-4">
                      <input placeholder="Rol / Funcție" className="p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}/>
                      <input placeholder="Țară" className="p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.country} onChange={e=>setForm({...form,country:e.target.value})}/>
                    </div>
                    <div className="bg-indigo-50 p-5 rounded-[2rem] border border-indigo-100">
                      <label className="block text-[11px] font-black text-indigo-700 uppercase mb-3 tracking-widest">Tip Organizație Internațională</label>
                      <select className="w-full p-4 bg-white rounded-2xl text-sm font-bold outline-none border border-indigo-100 focus:border-indigo-300 transition-colors text-slate-700 cursor-pointer" value={form.organizationType} onChange={e=>setForm({...form,organizationType:e.target.value})}>
                        {ORG_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <input placeholder="Email" type="email" className="p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
                      <input placeholder="Telefon" type="tel" className="p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
                    </div>
                    <input placeholder="Website" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100 focus:border-indigo-200 transition-colors" value={form.website} onChange={e=>setForm({...form,website:e.target.value})}/>
                    <textarea placeholder="Adresă sau Note adiționale..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none h-24 border border-slate-100 focus:border-indigo-200 transition-colors resize-none" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
                    {statusMessage&&<p className="text-center text-[10px] font-black text-amber-600 animate-pulse bg-amber-50 py-3 rounded-2xl border border-amber-100">{statusMessage}</p>}
                    <div className="flex gap-4 pt-4">
                      <button type="button" onClick={()=>setIsModalOpen(false)} className="flex-1 py-5 bg-slate-100 rounded-[2rem] font-black uppercase text-[11px] tracking-widest hover:bg-slate-200 transition-all">Anulează</button>
                      <button type="submit" disabled={isSaving} className={`flex-[2] py-5 rounded-[2rem] font-black uppercase text-[11px] tracking-[0.2em] shadow-2xl transition-all active:scale-95 ${isSaving?'bg-slate-300 text-slate-500 cursor-not-allowed':'bg-amber-500 text-[#0f172a] shadow-amber-500/30 hover:bg-amber-600'}`}>
                        {isSaving?'Sincronizare...':(editingId?'✓ Actualizează':'✓ Salvează în Cloud')}
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal Setări Cheie API */}
          {isSettingsOpen&&(
            <div className="fixed inset-0 bg-[#0f172a]/90 backdrop-blur-xl z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-[3rem] w-full max-w-md shadow-2xl p-10 modal-animate">
                <div className="flex items-center justify-between mb-8">
                  <div><h2 className="text-xl font-black uppercase tracking-widest text-slate-800">Setări AI</h2>
                  <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Cheie Gemini — stocată local pe dispozitiv</p></div>
                  <button onClick={()=>setIsSettingsOpen(false)} className="text-4xl font-thin text-slate-400 hover:text-slate-700 transition-colors leading-none">&times;</button>
                </div>
                <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4 mb-6 text-[11px] text-amber-800 font-semibold leading-relaxed">
                  🔒 Cheia nu apare în codul sursă de pe GitHub. Se salvează exclusiv în browserul tău (<code className="bg-amber-100 px-1 rounded">localStorage</code>) și nu este vizibilă pentru nimeni altcineva.
                </div>
                <label className="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3">Cheie API Google Gemini</label>
                <input type="password" placeholder="AIza..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-mono outline-none border border-slate-200 focus:border-amber-300 transition-colors mb-2" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)}/>
                <p className="text-[10px] text-slate-400 mb-8">Obții cheia din <span className="font-bold text-slate-600">aistudio.google.com</span> → Get API Key</p>
                <div className="flex gap-3">
                  {localStorage.getItem('arbi_gemini_key')&&(
                    <button type="button" onClick={()=>{localStorage.removeItem('arbi_gemini_key');setApiKeyInput('');setIsSettingsOpen(false);}} className="flex-1 py-4 bg-rose-50 text-rose-500 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-rose-100 transition-all border border-rose-100">Șterge Cheia</button>
                  )}
                  <button type="button" onClick={()=>{if(apiKeyInput.trim())localStorage.setItem('arbi_gemini_key',apiKeyInput.trim());setIsSettingsOpen(false);}} className="flex-[2] py-4 bg-amber-500 hover:bg-amber-600 text-[#0f172a] rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg">Salvează</button>
                </div>
              </div>
            </div>
          )}

          {/* Lightbox */}
          {viewPhoto&&(
            <div className="fixed inset-0 bg-[#0f172a]/98 z-[100] flex flex-col items-center justify-center p-6" onClick={()=>setViewPhoto(null)}>
              <div className="absolute top-10 right-10 flex gap-4" onClick={e=>e.stopPropagation()}>
                <button onClick={()=>{const a=document.createElement('a');a.href=viewPhoto;a.download='ARBI_Scan.jpg';a.click();}} className="bg-emerald-500 text-[#0f172a] p-5 rounded-2xl shadow-2xl hover:scale-110 transition-transform"><IconDl/></button>
                <button onClick={()=>setViewPhoto(null)} className="bg-white/10 text-white p-5 rounded-2xl text-4xl leading-none hover:bg-white/20 transition-colors">&times;</button>
              </div>
              <img src={viewPhoto} className="max-w-full max-h-[85vh] rounded-[3rem] shadow-2xl border-4 border-white/10" alt="Card"/>
            </div>
          )}

          {/* Footer */}
          <footer className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 py-3.5 px-8 z-40 print-hidden shadow-lg">
            <div className="max-w-7xl mx-auto flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
              <div className="flex items-center gap-6">
                <span className="flex items-center gap-2"><div className={`w-2 h-2 rounded-full ${syncStatus==='synced'?'bg-emerald-500':'bg-amber-500 animate-pulse'}`}></div>{syncStatus==='synced'?'Sincronizat':'Se conectează'}</span>
                <span className="opacity-50">ARBI SCI Registry v7.0</span>
              </div>
              <span className="hidden sm:inline">{filtered.length} / {contacts.length} contacte</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
